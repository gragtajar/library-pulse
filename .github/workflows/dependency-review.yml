name: Dependency review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # Advisory until the repo's Dependency graph is enabled
    # (Settings → Code security → Dependency graph). Without it the action
    # hard-errors; continue-on-error keeps it from blocking PRs. Once enabled,
    # remove this line to make high-severity findings block again.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
